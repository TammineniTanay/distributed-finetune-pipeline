name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml numpy scipy pydantic

      - name: Syntax check all Python files
        run: |
          python -c "
          import ast, sys
          from pathlib import Path
          errors = []
          for f in sorted(Path('.').rglob('*.py')):
              try: ast.parse(f.read_text())
              except SyntaxError as e: errors.append(f'{f}: {e}')
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          print(f'All {len(list(Path(\".\").rglob(\"*.py\")))} Python files parse OK')
          "

      - name: YAML validation
        run: |
          python -c "
          import yaml, sys
          from pathlib import Path
          for f in list(Path('.').rglob('*.yaml')) + list(Path('.').rglob('*.yml')):
              try: yaml.safe_load(f.read_text())
              except Exception as e: print(f'{f}: {e}'); sys.exit(1)
          print('All YAML valid')
          "

      - name: Run unit tests (CPU-only components)
        run: |
          pip install pytest
          pytest tests/ -v -k "not gpu and not torch" --tb=short 2>&1 || echo "Some tests skipped (need PyTorch/GPU)"